# nginx config for the AstroPaper+ Docker image.
#
# Mirrors the security headers from `_headers` (Cloudflare/Netlify
# format) so Docker deploys don't silently drop the entire
# security-header posture. The static headers and CSP are pulled
# from `dist/nginx-headers.conf`, which `cloudflareHeadersIntegration`
# in `astro.config.ts` regenerates on every build from the same
# `_headers` template the Cloudflare deploy uses — single source of
# truth, strict CSP (per-script `sha256-…` allowlist, no
# `'unsafe-inline'`), zero manual upkeep.
#
# Dockerfile copies `dist/nginx-headers.conf` into the image at
# `/etc/nginx/nginx-headers.conf` and the `include` below picks it up.
# On every `pnpm build:site`, the file is overwritten with the new
# computed hashes, so the Docker image picks up script-source changes
# automatically next time it's built.
#
# `always` is required for every directive: nginx otherwise skips
# `add_header` for error responses (4xx/5xx), which is exactly the
# surface an attacker probes.
#
# TLS
# ---
# This config listens on **plain HTTP/80 only**. TLS termination is
# assumed to happen at an upstream proxy / load balancer / CDN (e.g.
# Cloudflare, an ELB, or a separate `nginx-proxy` sidecar with cert
# mount). The HSTS header emitted via `include
# /etc/nginx/nginx-headers.conf;` is meaningful ONLY when clients
# reach the site over HTTPS — placing it behind an HTTP-only nginx
# is harmless but wastes bytes; placing it on a plain-HTTP nginx the
# client can reach directly would actively teach browsers to upgrade
# to HTTPS for a host that can't serve it. Operators exposing this
# image without an HTTPS terminator MUST drop the HSTS line from
# `src/integrations/cloudflareHeaders.ts` (`NGINX_STATIC_HEADER_LINES`)
# before building.
#
# If a future deployment needs in-container TLS (e.g. a
# cert-manager + sidecar-less deploy), uncomment the `listen 443 ssl
# http2;` block at the bottom of this file and mount the cert chain
# into `/etc/nginx/certs/`.

# Per-path Cache-Control. Five rules, evaluated in order, first match wins:
#
#   1. `~":404$"` — ANY 404 response (matched by URI+status key
#      suffix) gets an empty value. This is the deploy-race safety
#      net: when HTML references an `/_astro/<hash>.js` the running
#      instance doesn't have yet, `try_files $uri =404;` returns a
#      404. We must NOT pin that 404 in browsers/intermediate caches
#      for a year, or the asset stays broken even after the file
#      appears. The empty value means `add_header` doesn't emit a
#      Cache-Control header at all on the 404.
#
#   2. `~"^/_astro/"` — hashed `/_astro/*` bundles ship
#      `public, max-age=31536000, immutable`. The `immutable` token
#      tells browsers honoring it to skip revalidation on hard
#      reload. Only the 2xx/3xx case hits this branch because rule 1
#      short-circuits every 404 first.
#
#   3. `~"^/pagefind/pagefind\.js$"` — the small Pagefind entry script
#      gets the same one-year immutable treatment as the rest of the
#      hashed asset bundles. Checked BEFORE the broader `/pagefind/`
#      rule so the more specific path wins.
#
#   4. `~"^/pagefind/"` — every other Pagefind asset (the per-post
#      fragment indexes at `/pagefind/fragment/<hash>.pf_fragment`,
#      the metadata JSON, the WASM worker) ships with a one-hour
#      `must-revalidate`. One hour is short enough that an entry
#      post that gets new content (a date bump, a republished title)
#      picks up the fresh fragments on the next visitor, but long
#      enough that re-scanning the same search index doesn't
#      hammer the origin.
#
#   5. `default ""` — every other response gets no Cache-Control
#      override. The upstream default (or no header at all) is
#      correct for HTML: we want browsers to revalidate after each
#      deploy.
#
# The key is `"$uri:$status"` so the value is computed at request
# time. nginx `map` lives in the `http` block; this file is included
# via `/etc/nginx/conf.d/*.conf;` in the upstream `nginx.conf`, so
# the directive at the top of the file is already inside `http`.
#
# QUOTING IS LOAD-BEARING: write `"~regex"`, never `~"regex"`.
# nginx's config lexer only treats a quote as a string delimiter when
# it is the FIRST character of a token. In `~"^/_astro/"` the token
# starts with `~`, so both quotes are kept as literal characters and
# the compiled pattern becomes `"^/_astro/"` — it would only match a
# subject containing a literal double-quote, so it never fires. nginx
# accepts it silently (valid PCRE), every rule falls through to
# `default ""`, and `add_header` emits nothing at all. That shipped
# from the initial commit: `/_astro/*` served with NO Cache-Control
# in every Docker deploy. Cloudflare was unaffected (it reads
# `_headers`, not this file), and the local gate skips the Docker
# probe when Docker is absent, so nothing caught it until CI ran
# `pnpm test:nginx-headers` for real. nginx's own map docs use the
# `"~Opera Mini"` form for exactly this reason.
map "$uri:$status" $astro_cache_control {
    default "";
    "~:404$" "";
    "~^/_astro/" "public, max-age=31536000, immutable";
    "~^/pagefind/pagefind\.js$" "public, max-age=31536000, immutable";
    "~^/pagefind/" "public, max-age=3600, must-revalidate";
}

server_tokens off; # Don't advertise the nginx version on error pages / Server header.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text-ish MIME types — same set Cloudflare applies.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        # nginx >= 1.21.1 (this image pins 1.30.4) serves `.js` from the
        # stock mime.types as `text/javascript`, NOT `application/javascript`
        # — so BOTH spellings must stay listed or Astro's hashed
        # `/_astro/*.js` bundles ship uncompressed. The gzip probe in
        # scripts/test-nginx-headers.mjs pins this. Shiki also ships woff2;
        # wasm chunks appear on some astro middleware paths.
        text/javascript
        font/woff2
        application/wasm;

    # Cache-Control, computed from the `$astro_cache_control` map.
    # `always` ships the header on every response — including the
    # 404 case — but the map pins the 404 value to `""`, so the
    # header is not actually emitted on 404. This is intentional:
    # `always` here matches the `always` on every other security
    # header in the include below, so the response-code behaviour
    # of every header in this config is uniform.
    #
    # The location blocks below do NOT carry their own
    # `add_header Cache-Control` (HIGH #1 / MEDIUM #26 in issues.md
    # used to) — the inner block's `add_header` would have wiped
    # the inherited `include /etc/nginx/nginx-headers.conf;` from
    # the parent, stripping CSP / XCTO / XFO / Referrer-Policy /
    # Permissions-Policy / HSTS / COOP / CORP / COEP from every
    # `/_astro/*` response. By moving the Cache-Control decision
    # up to the server level, every location inherits BOTH the
    # Cache-Control AND the security headers' include cleanly —
    # including the `/pagefind/*` blocks below, which would
    # otherwise drop CSP for every pagefind JS / fragment request.
    add_header Cache-Control $astro_cache_control always;

    # R4: render Astro's themed `dist/404.html` (locale-aware nav +
    # search hint, same chrome as the rest of the site) on misses
    # instead of nginx's bare white error page. Without this,
    # Docker users hitting a stale URL lose every site affordance;
    # Cloudflare Pages picks up `404.html` automatically, which is
    # why the bug only manifested in Docker. Default behaviour
    # preserves the 404 status (the explicit `=404` is omitted on
    # purpose: nginx's default for `error_page <code> <uri>` is to
    # keep the original code).
    error_page 404 /404.html;

    location ~* /_astro/ {
        try_files $uri =404;
    }

    # P1-9: pagefind assets get an explicit cache policy via the
    # `$astro_cache_control` map above. These blocks intentionally
    # carry NO `add_header` directives — only `try_files`. Adding
    # `add_header Cache-Control ...` here would wipe the inherited
    # `include /etc/nginx/nginx-headers.conf;` from the server
    # block, stripping CSP / XCTO / XFO / Referrer-Policy / HSTS /
    # COOP / CORP / COEP from every pagefind response (a serious
    # security-header regression for Docker deploys).
    location /pagefind/ {
        try_files $uri =404;
    }

    location = /pagefind/pagefind.js {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ─── Security headers (generated by astro.config.ts from _headers) ───
    include /etc/nginx/nginx-headers.conf;
}