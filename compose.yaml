# `compose.yaml` — LOCAL DEV ONLY.
#
# Build + run with:
#   docker compose up --build
#
# This is the recommended workflow over `pnpm dev` for users who
# need a Node-isolated environment (e.g. Windows without Node, or
# pinned Linux glibc).
#
# This compose stack is INTENTIONALLY NOT hardened (no `read_only`,
# no `cap_drop: ALL`, no non-root `user:`). Reasons:
#
#   1. Dev containers need write access to `node_modules/` (or to
#      the host bind mount), to `/tmp` (Vite cache), and to `/home`
#      (pnpm env stores). `read_only: true` breaks all three.
#   2. `pnpm install` writes to the bind-mounted project dir at
#      unpredictable paths. A capability / seccomp profile that
#      would surface a real exploit here is overkill for a stack
#      that's already gated by a host firewall in front of the
#      published port.
#   3. `security_opt: [no-new-privileges:true]` IS cheap and
#      doesn't break `pnpm install`, so we apply it as the one
#      low-cost hardening step.
#
# Production nginx hardening lives in `Dockerfile` (non-root `USER`,
# writable dir `chown`, `HEALTHCHECK`).
services:
  app:
    image: ghcr.io/pnpm/pnpm:10.18.1
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "4321:4321"
    working_dir: /app
    command:
      [
        "bash",
        "-c",
        "pnpm env use -g 24 && pnpm install --frozen-lockfile && pnpm prune && pnpm run dev --host 0.0.0.0",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4321').then(r => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./:/app
      - /app/node_modules
