# gitleaks config for AstroPaper+.
#
# `pnpm secret:scan` (see scripts/secret-scan.mjs) runs gitleaks with
# this config. The allowlist excludes the project's build/cache
# directories so we don't false-positive on:
#
#   - gitleaks' own downloaded README.md (it ships test fixtures)
#   - Astro's build output (dist/)
#   - pnpm's `node_modules/`
#   - Astro's generated `.astro/` types
#   - Vitest's coverage/ and `.vitest-cache/`
#   - Pagefind's generated `public/pagefind/` index
#
# Anything else scanned here is the working tree or git history, which
# is the surface that matters for the "no leaked secrets" claim.
title = "AstroPaper+ gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "exclude build/cache artifacts from scanning"
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)dist/''',
  '''(^|/)\.astro/''',
  '''(^|/)public/pagefind/''',
  '''(^|/)coverage/''',
  '''(^|/)\.vitest-cache/''',
  '''(^|/)\.cache/''',
  '''(^|/)\.legacy-i18n-cleanup/''',
  # Generated by the build, no source of leaks
  '''(^|/)dist/_headers$''',
  '''(^|/)dist/nginx-headers\.conf$''',
  # Lockfile — pnpm-lock.yaml contains commit SHAs that match
  # generic hash rules; manually reviewed as safe.
  '''(^|/)pnpm-lock\.yaml$''',
]
